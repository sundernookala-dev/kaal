<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 520px;
      height: 620px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #08080a;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .offline {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #c9a84c;
      text-align: center;
      padding: 40px;
    }
    .offline h2 { margin: 0 0 8px; font-size: 18px; letter-spacing: 4px; }
    .offline p { color: #666; font-size: 12px; line-height: 1.6; margin: 0; }
    .offline code { background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  </style>
</head>
<body>
  <iframe id="app" src="http://localhost:3000"></iframe>
  <div class="offline" id="offline" style="display:none">
    <h2>⏳ KAAL</h2>
    <p>
      Server is not running.<br><br>
      Open Terminal and run:<br>
      <code>cd ~/kaal && npm start</code>
    </p>
  </div>
  <script>
    // If server isn't running, show offline message
    const iframe = document.getElementById('app');
    const offline = document.getElementById('offline');
    iframe.onerror = () => { iframe.style.display = 'none'; offline.style.display = 'flex'; };
    // Also check with fetch
    fetch('http://localhost:3000/api/health').catch(() => {
      iframe.style.display = 'none';
      offline.style.display = 'flex';
    });
  </script>
</body>
</html>
