const eventCache={};
async function fetchEvents(){
  const cacheKey=S.vy+'-'+S.vm;
  try{const n=new Date(S.vy,S.vm,1),e=new Date(S.vy,S.vm+1,0,23,59,59);
  const r=await fetch(API+'/events?start='+n.toISOString()+'&end='+e.toISOString());
  const data=await r.json();
  S.events=data;eventCache[cacheKey]=data}catch(e){S.events=eventCache[cacheKey]||[]}
  renderContent()}

function parseFEN(fen){
  const rows=fen.split(' ')[0].split('/');
  const board=[];
  rows.forEach(row=>{const r=[];for(const c of row){if(c>='1'&&c<='8')for(let i=0;i<parseInt(c);i++)r.push('');else r.push(c)}board.push(r)});
  return board;
}

const ASTRO_LESSONS=[
  {id:0,title:'What is Space?',content:'Space is everything beyond Earth\'s atmosphere. It\'s mostly empty — a vast vacuum with no air. But scattered through this emptiness are incredible objects: stars, planets, moons, asteroids, and galaxies.',
  facts:['Space begins about 100 km above Earth (the Kármán line)','In space, no one can hear you scream — sound needs air to travel','Space is not completely empty — it has tiny particles and radiation'],
  observe:'Tonight, go outside and look up. Everything you see with your naked eye is within our galaxy, the Milky Way.'},
  {id:1,title:'Our Star — The Sun',content:'The Sun is a medium-sized star about 4.6 billion years old. It\'s a ball of hot gas (mostly hydrogen and helium) where nuclear fusion produces enormous energy. Light from the Sun takes 8 minutes 20 seconds to reach Earth.',
  facts:['The Sun is 109 times wider than Earth','Its surface temperature is about 5,500°C','The Sun will last another 5 billion years'],
  observe:'NEVER look directly at the Sun through your Celestron! Use a solar filter. Instead, notice how the Sun moves across the sky — this is actually Earth rotating.'},
  {id:2,title:'The Moon — Our Nearest Neighbor',content:'The Moon is Earth\'s only natural satellite, about 384,400 km away. It\'s the easiest object to observe with your Celestron telescope. The dark patches are ancient lava plains called "maria" (seas).',
  facts:['The Moon always shows the same face to Earth','It takes 27.3 days to orbit Earth','The Moon has no atmosphere — footprints there last millions of years'],
  observe:'Point your Celestron at the Moon tonight! Start with lowest magnification. The craters along the day/night line (terminator) show the most detail because of shadows.'},
  {id:3,title:'The Solar System — Inner Planets',content:'The four inner planets are rocky worlds: Mercury (smallest, closest to Sun), Venus (hottest, thick clouds), Earth (just right for life), and Mars (the red planet, has the largest volcano in the solar system).',
  facts:['Venus rotates backwards compared to other planets','Mars has a mountain 3x taller than Everest (Olympus Mons)','Mercury has no atmosphere and extreme temperature swings'],
  observe:'Venus is often the brightest object after the Moon — look for a brilliant "star" near the horizon at sunset or sunrise. Through your Celestron, you can see its crescent phases like a tiny Moon!'},
  {id:4,title:'The Solar System — Outer Planets',content:'The outer planets are gas/ice giants: Jupiter (largest, has 95 known moons), Saturn (famous rings), Uranus (tilted sideways), and Neptune (windiest planet, 2000 km/h winds).',
  facts:['Jupiter\'s Great Red Spot is a storm bigger than Earth','Saturn\'s rings are mostly ice particles','If Saturn were placed in water, it would float — it\'s less dense than water'],
  observe:'Jupiter and Saturn are magnificent through your Celestron! Jupiter shows bands of clouds and its 4 bright moons (Galilean moons). Saturn\'s rings are visible even at low magnification.'},
  {id:5,title:'Stars — What Are They?',content:'Stars are huge balls of gas undergoing nuclear fusion. Their color tells you their temperature: blue stars are hottest (30,000°C+), white are hot, yellow (like our Sun) are medium, and red stars are coolest (3,000°C). Brighter stars aren\'t always closer — some are just genuinely enormous.',
  facts:['The nearest star (Proxima Centauri) is 4.24 light-years away','A light-year is about 9.46 trillion kilometers','Stars twinkle because Earth\'s atmosphere bends their light'],
  observe:'Look for color differences in stars tonight. Betelgeuse (Orion\'s shoulder) is red/orange. Sirius (brightest star) appears white/blue. Through your Celestron, these colors become more vivid.'},
  {id:6,title:'Constellations — Patterns in the Sky',content:'Constellations are patterns of stars that ancient cultures imagined as figures. There are 88 official constellations. They\'re like a map of the sky — once you learn a few, you can navigate to find anything. From Udupi (13°N latitude), you can see most constellations through the year.',
  facts:['Stars in a constellation aren\'t actually near each other in space','The Big Dipper is not a constellation — it\'s part of Ursa Major','Different cultures saw different patterns in the same stars'],
  observe:'Find Orion (the Hunter) — three stars in a row form his belt. It\'s one of the easiest constellations to spot and visible from Udupi during winter months.'},
  {id:7,title:'Your Celestron Telescope — Getting Started',content:'Your Celestron is a window to the universe! Start with these basics: always begin with the lowest magnification eyepiece (highest number, e.g., 25mm). This gives you the widest view to find objects. Then switch to higher magnification to zoom in.',
  facts:['Lower eyepiece number = higher magnification','Never point your telescope at the Sun without a solar filter','Let your telescope cool down outside for 20 minutes before observing'],
  observe:'Practice by pointing at the Moon first — it\'s big, bright, and easy to find. Center it with low magnification, then swap to your highest eyepiece. You\'ll see craters, mountains, and maria!'},
  {id:8,title:'What Can You See From Udupi?',content:'Udupi at 13°N latitude has excellent sky access! You can see most of the northern sky and a good portion of the southern sky. Light pollution affects visibility, so the darker your location, the more you\'ll see. The best viewing is on moonless nights, away from city lights.',

async function startPomo(taskText){
  const dur=parseInt(S.pomo.duration)||25;
  try{const r=await fetch(API+'/pomodoro/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_text:taskText,duration:dur})});
  const d=await r.json();S.pomo={active:true,sessionId:d.id,taskText,timeLeft:dur*60,duration:dur,onBreak:false,count:S.pomo.count};renderContent()}catch(e){}
}
async function completePomo(){
  if(S.pomo.sessionId)await fetch(API+'/pomodoro/'+S.pomo.sessionId+'/complete',{method:'POST'});

      if(stats.todo) h+=`<div style="font-family:${FM};font-size:9px;color:${c.text3};margin-top:1px">○ ${stats.todo} to-do</div>`;

    }
    h+='</div>';
  }
  h+='</div>';

  // Legend
  h+=`<div style="display:flex;gap:16px;margin-top:16px;justify-content:center">

    return h;
  }

  // Streak cards
  h+=`<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">`;
  habits.forEach(hab=>{
    const streak=streaks[hab.id]||0;
    h+=`<div style="padding:12px 16px;border-radius:10px;background:${c.surface};border:1px solid ${c.border};min-width:140px;flex:1">
      <div style="font-size:13px;font-weight:600;color:${c.text};margin-bottom:4px">${esc(hab.name)}</div>
      <div style="font-family:${FM};font-size:20px;font-weight:300;color:${streak>0?c.accent:c.text3}">${streak>0?'🔥 '+streak+' days':'No streak'}</div>
    </div>`;
  });
  h+=`</div>`;

  // Heatmap per habit
  habits.forEach(hab=>{
    h+=`<div style="margin-bottom:16px">`;
    h+=`<div style="font-size:13px;font-weight:600;color:${c.text};margin-bottom:8px">${esc(hab.name)}</div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;
    DAYS.forEach(d=>{h+=`<div style="text-align:center;font-family:${FM};font-size:9px;color:${c.text3};padding:2px">${d.charAt(0)}</div>`});
    for(let i=0;i<fd;i++) h+=`<div></div>`;
    for(let day=1;day<=dim;day++){
      const dateStr=S.hvy+'-'+pad(S.hvm+1)+'-'+pad(day);
      const dayData=byDate[dateStr]||{};
      const done=dayData[hab.id]||0;
      const isT=day===today;
      const isFuture=S.hvy>now.getFullYear()||(S.hvy===now.getFullYear()&&S.hvm>now.getMonth())||(S.hvy===now.getFullYear()&&S.hvm===now.getMonth()&&day>now.getDate());
      const bg=done?c.green:(isT?'rgba(139,105,20,0.08)':c.surface2);
      const clickable=!isFuture;
      h+=`<div ${clickable?`onclick="openDayModal('${dateStr}')"`:''} style="aspect-ratio:1;border-radius:4px;background:${bg};display:flex;align-items:center;justify-content:center;font-family:${FM};font-size:10px;color:${done?'#fff':c.text3};font-weight:${isT?'700':'400'};${clickable?'cursor:pointer':'opacity:0.4'}">${day}</div>`;
    }
    h+=`</div></div>`;
  });

  return h;
}

function renderVitamins(){
  const c=C();
  const slotLabels={morning:'🌅 Morning',noon:'☀️ Noon',night:'🌙 Night'};
  const slotTimes={morning:S.vitamin_morning||'08:00',noon:S.vitamin_noon||'13:00',night:S.vitamin_night||'21:00'};
  const grouped={morning:[],noon:[],night:[]};
  S.vitamins.forEach(v=>{(grouped[v.time_slot]=grouped[v.time_slot]||[]).push(v)});

  const total=S.vitamins.length;
  const taken=S.vitamins.filter(v=>v.taken).length;
  const pct=total?Math.round(taken/total*100):0;

  let h='';

  // Progress
  if(total>0){
    h+=`<div style="padding:20px;border-radius:12px;background:${c.surface};border:1px solid ${c.border};margin-bottom:16px">`;
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:16px;font-weight:600;color:${c.text}">💊 ${taken}/${total} taken</div>
      <div style="font-family:${FM};font-size:12px;color:${pct===100?c.green:c.text3}">${pct}%</div>
    </div>`;
    h+=`<div style="height:6px;border-radius:3px;background:${c.surface2};overflow:hidden">
      <div style="height:100%;border-radius:3px;background:${pct===100?c.green:c.accent};width:${pct}%;transition:width 0.3s"></div>
    </div></div>`;
  }

  // Grouped by time slot
  ['morning','noon','night'].forEach(slot=>{
    const items=grouped[slot]||[];
    if(!items.length) return;

    h+=`<div style="margin-bottom:16px">`;
    h+=`<div style="font-size:14px;font-weight:600;color:${c.text};margin-bottom:10px">${slotLabels[slot]} <span style="font-family:${FM};font-size:11px;font-weight:400;color:${c.text3}">${slotTimes[slot]}</span></div>`;
    items.forEach(v=>{
      h+=`<div onclick="toggleVitamin(${v.vitamin_id},'${v.time_slot}')" style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;margin-bottom:6px;background:${v.taken?'rgba(46,125,66,0.06)':c.surface};border:1px solid ${v.taken?'rgba(46,125,66,0.15)':c.border};cursor:pointer;transition:all 0.15s"
        onmouseenter="this.style.borderColor='${c.accentBorder}'" onmouseleave="this.style.borderColor='${v.taken?'rgba(46,125,66,0.15)':c.border}'">
        <div style="width:24px;height:24px;border-radius:7px;border:2px solid ${v.taken?c.green:c.text3};background:${v.taken?c.green:'transparent'};display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0">${v.taken?'✓':''}</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:500;color:${v.taken?c.text3:c.text};${v.taken?'text-decoration:line-through':''}">${esc(v.name)}</div>
          <div style="font-family:${FM};font-size:10px;color:${c.text3};margin-top:2px">${v.schedule_desc}${v.notes?' · '+esc(v.notes):''}</div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  });

  if(total===0){
    h+=`<div style="padding:30px;text-align:center;border-radius:12px;background:${c.surface};border:1px solid ${c.border}">
      <div style="font-size:14px;color:${c.text3}">No vitamins configured. Add them in Settings → Manage Vitamins.</div>
    </div>`;
  }

  return h;

function renderChess(){
  const c=C();
  const p=S.chessPuzzle;
  if(!p) return '<div style="text-align:center;padding:30px;color:'+c.text3+'">Loading puzzle...</div>';
  const fen=p.fen||'';
  const board=parseFEN(fen);
  const turn=fen.split(' ')[1]==='w'?'White':'Black';
  const solution=p.solution||[];

  let h='<div style="padding:20px;border-radius:12px;background:'+c.surface+';border:1px solid '+c.border+'">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h+='<div><div style="font-size:16px;font-weight:600;color:'+c.text+'">♟️ Daily Chess Puzzle</div>';
  h+='<div style="font-family:'+FM+';font-size:11px;color:'+c.text3+';margin-top:4px">'+turn+' to move · '+(S.chessSolved?'Solved! ✅':'Find the checkmate')+' · Rating: '+(p.rating||'?')+'</div></div>';
  h+='<button onclick="fetchChessPuzzle()" style="padding:8px 16px;border-radius:7px;border:1px solid '+c.border+';background:'+c.surface2+';color:'+c.text2+';cursor:pointer;font-family:'+FM+';font-size:11px">New Puzzle</button></div>';

  h+='<div style="display:inline-grid;grid-template-columns:repeat(8,1fr);border:2px solid '+c.text3+';border-radius:4px;overflow:hidden;max-width:400px">';
  for(let r=0;r<8;r++){for(let cl=0;cl<8;cl++){
    const isLight=(r+cl)%2===0;
    const piece=board[r]?board[r][cl]:'';
    const sq=coordToAlg(r,cl);
    const isSel=S.chessSelected===sq;
    const bg=isSel?'rgba(139,105,20,0.4)':isLight?'#f0d9b5':'#b58863';
    h+='<div onclick="chessClick(\''+sq+'\','+r+','+cl+')" style="width:50px;height:50px;display:flex;align-items:center;justify-content:center;background:'+bg+';cursor:pointer;font-size:32px;user-select:none">'+(PIECES[piece]||'')+'</div>';

    h+='<div style="margin-top:12px;display:flex;gap:8px">';

  } else {
    h+='<div style="margin-top:12px;padding:12px;border-radius:8px;background:rgba(46,125,66,0.08);border:1px solid rgba(46,125,66,0.15)">';
    h+='<div style="font-size:14px;font-weight:600;color:'+c.green+'">Excellent! Puzzle solved! 🎉</div>';
    h+='<div style="font-family:'+FM+';font-size:11px;color:'+c.text3+';margin-top:4px">Puzzles solved: '+(S.hobbyProgress.chess||0)+'</div></div>';

// ── KAAYA (Weight Tracker) ──
async function fetchWeight(){try{const r=await fetch(API+'/weight?period='+S.weightPeriod);S.weightData=await r.json()}catch(e){}renderContent()}
async function logWeight(weight,date){
  await fetch(API+'/weight',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({weight:parseFloat(weight),date})});
  fetchWeight();
}

  const c=C();
  const w=S.weightData;
  const logs=w.logs||[];
  const today=new Date().toLocaleDateString('en-CA');
  const todayLog=logs.find(l=>l.date===today);

  let h='';

  // Log today's weight
  h+='<div style="padding:22px;border-radius:14px;background:'+c.surface+';border:1px solid '+c.border+';margin-bottom:20px">';
  h+='<div style="font-size:20px;font-weight:700;color:'+c.text+';margin-bottom:16px">⚖️ Log Weight</div>';
  h+='<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">';
  h+='<input id="weight-input" type="number" step="0.1" placeholder="e.g. 72.5" value="'+(todayLog?todayLog.weight:'')+'" style="width:140px;padding:12px 16px;border-radius:8px;border:1px solid '+c.border+';background:'+c.surface2+';color:'+c.text+';font-size:18px;font-family:'+FM+';outline:none" onkeydown="if(event.key===\'Enter\')logWeightFromInput()">';
  h+='<span style="font-size:14px;color:'+c.text2+'">kg</span>';
  h+='<input id="weight-date" type="date" value="'+today+'" style="padding:10px 12px;border-radius:8px;border:1px solid '+c.border+';background:'+c.surface2+';color:'+c.text+';font-family:'+FM+';font-size:12px;outline:none">';
  h+='<button onclick="logWeightFromInput()" style="padding:10px 20px;border-radius:8px;border:none;background:'+c.accent+';color:#fff;cursor:pointer;font-family:'+FM+';font-size:13px;font-weight:600">Save</button>';
  h+='</div>';
  if(todayLog) h+='<div style="font-family:'+FM+';font-size:11px;color:'+c.green+';margin-top:8px">✓ Today\'s weight: '+todayLog.weight+' kg</div>';
  h+='</div>';

  // Stats cards
  const goal=parseFloat(S.weight_goal)||70;
  if(logs.length>0){
    const latest=w.latest?w.latest.weight:0;
    const toGoal=+(latest-goal).toFixed(1);
    const goalMet=latest<=goal;

    h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px">';
    const stats=[
      {label:'Latest',value:latest+' kg',color:c.text},
      {label:'Goal',value:goal+' kg',color:c.accent},
      {label:'To Goal',value:(toGoal>0?toGoal+' kg to go':goalMet?'Goal reached!':''),color:goalMet?c.green:c.amber},
    ];
    stats.forEach(s=>{
      h+='<div style="padding:14px;border-radius:10px;background:'+c.surface+';border:1px solid '+c.border+';text-align:center">';
      h+='<div style="font-family:'+FM+';font-size:9px;color:'+c.text3+';letter-spacing:1px;margin-bottom:6px">'+s.label.toUpperCase()+'</div>';
      h+='<div style="font-size:16px;font-weight:600;color:'+s.color+'">'+s.value+'</div></div>';
    });
    h+='</div>';

    // Progress bar to goal
    if(!goalMet&&w.count>1){
      const firstW=logs[0].weight;
      const totalDrop=firstW-goal;
      const dropped=firstW-latest;
      const pct=totalDrop>0?Math.min(100,Math.max(0,Math.round(dropped/totalDrop*100))):0;
      h+='<div style="padding:14px 18px;border-radius:10px;background:'+c.surface+';border:1px solid '+c.border+';margin-bottom:12px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      h+='<span style="font-size:13px;color:'+c.text+'">Progress to goal</span>';
      h+='<span style="font-family:'+FM+';font-size:12px;color:'+c.accent+'">'+pct+'%</span></div>';
      h+='<div style="height:8px;border-radius:4px;background:'+c.surface2+';overflow:hidden">';
      h+='<div style="height:100%;border-radius:4px;background:'+c.accent+';width:'+pct+'%;transition:width 0.3s"></div></div>';
      h+='<div style="display:flex;justify-content:space-between;margin-top:6px">';
      h+='<span style="font-family:'+FM+';font-size:9px;color:'+c.text3+'">Start: '+firstW+' kg</span>';
      h+='<span style="font-family:'+FM+';font-size:9px;color:'+c.text3+'">Goal: '+goal+' kg</span></div>';
      h+='</div>';
    }

    h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">';
    [{label:'Change',value:(w.change>0?'+':'')+w.change+' kg',color:w.change>0?c.red:w.change<0?c.green:c.text3},
     {label:'Average',value:w.avg+' kg',color:c.text2},
     {label:'Range',value:w.min+'–'+w.max,color:c.text2}].forEach(s=>{
      h+='<div style="padding:12px;border-radius:10px;background:'+c.surface+';border:1px solid '+c.border+';text-align:center">';
      h+='<div style="font-family:'+FM+';font-size:9px;color:'+c.text3+';letter-spacing:1px;margin-bottom:4px">'+s.label.toUpperCase()+'</div>';
      h+='<div style="font-size:14px;font-weight:600;color:'+s.color+'">'+s.value+'</div></div>';
    });
    h+='</div>';
  }

  // Period selector
  h+='<div style="display:flex;gap:4px;margin-bottom:16px;background:'+c.surface2+';border-radius:8px;padding:3px;border:1px solid '+c.border+';max-width:400px">';
  [{k:'week',l:'7 Days'},{k:'month',l:'30 Days'},{k:'quarter',l:'90 Days'},{k:'year',l:'1 Year'}].forEach(p=>{
    h+='<button onclick="S.weightPeriod=\''+p.k+'\';fetchWeight()" style="flex:1;padding:7px 10px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:'+(S.weightPeriod===p.k?'600':'400')+';font-family:'+FB+';background:'+(S.weightPeriod===p.k?c.surface:'transparent')+';color:'+(S.weightPeriod===p.k?c.accent:c.text2)+'">'+p.l+'</button>';
  });
  h+='</div>';

  // Chart
  if(logs.length>1){
    const goalW=parseFloat(S.weight_goal)||70;
    const minW=Math.floor(Math.min(w.min,goalW)-1);
    const maxW=Math.ceil(Math.max(w.max,goalW)+1);
    const range=maxW-minW||1;
    const chartH=200;

    h+='<div style="padding:20px;border-radius:12px;background:'+c.surface+';border:1px solid '+c.border+';margin-bottom:16px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
    h+='<div style="font-size:14px;font-weight:600;color:'+c.text+'">Weight Trend</div>';
    h+='<div style="display:flex;align-items:center;gap:12px">';
    h+='<span style="display:flex;align-items:center;gap:4px;font-family:'+FM+';font-size:9px;color:'+c.accent+'"><span style="display:inline-block;width:14px;height:2px;background:'+c.accent+'"></span>Weight</span>';
    h+='<span style="display:flex;align-items:center;gap:4px;font-family:'+FM+';font-size:9px;color:'+c.green+'"><span style="display:inline-block;width:14px;height:2px;background:'+c.green+';border-top:1px dashed '+c.green+'"></span>Goal</span>';
    h+='</div></div>';

    // SVG chart
    const chartW=600;
    const padL=45,padR=10,padT=10,padB=30;
    const plotW=chartW-padL-padR;
    const plotH=chartH-padT-padB;

    h+='<svg viewBox="0 0 '+chartW+' '+chartH+'" style="width:100%;height:auto">';

    // Grid lines
    const gridLines=5;
    for(let i=0;i<=gridLines;i++){
      const y=padT+(plotH/gridLines)*i;
      const val=(maxW-(range/gridLines)*i).toFixed(1);
      h+='<line x1="'+padL+'" y1="'+y+'" x2="'+(chartW-padR)+'" y2="'+y+'" stroke="'+(S.dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)')+'" stroke-width="0.5"/>';
      h+='<text x="'+(padL-6)+'" y="'+(y+3)+'" text-anchor="end" fill="'+c.text3+'" font-family="'+FM+'" font-size="9">'+val+'</text>';
    }

    // Goal line
    const goalY=padT+plotH-((goalW-minW)/range)*plotH;
    h+='<line x1="'+padL+'" y1="'+goalY+'" x2="'+(chartW-padR)+'" y2="'+goalY+'" stroke="'+c.green+'" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>';
    h+='<text x="'+(chartW-padR-2)+'" y="'+(goalY-5)+'" text-anchor="end" fill="'+c.green+'" font-family="'+FM+'" font-size="9">Goal '+goalW+'</text>';

    // Data points and line
    const points=logs.map((l,i)=>{
      const x=padL+(plotW/(logs.length-1||1))*i;
      const y=padT+plotH-((l.weight-minW)/range)*plotH;
      return{x,y,w:l.weight,d:l.date};
    });

    // Line
    let pathD='M'+points.map(p=>p.x+','+p.y).join(' L');
    h+='<path d="'+pathD+'" fill="none" stroke="'+c.accent+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';

    // Area fill
    h+='<path d="'+pathD+' L'+points[points.length-1].x+','+(padT+plotH)+' L'+points[0].x+','+(padT+plotH)+' Z" fill="'+c.accent+'" opacity="0.06"/>';

    // Dots
    points.forEach(p=>{
      h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="'+c.accent+'" stroke="'+c.surface+'" stroke-width="1.5"/>';
    });

    // X axis labels (show ~6 dates)
    const step=Math.max(1,Math.floor(logs.length/6));
    logs.forEach((l,i)=>{
      if(i%step!==0&&i!==logs.length-1)return;
      const x=padL+(plotW/(logs.length-1||1))*i;
      const d=new Date(l.date+'T12:00:00');
      const label=d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
      h+='<text x="'+x+'" y="'+(chartH-4)+'" text-anchor="middle" fill="'+c.text3+'" font-family="'+FM+'" font-size="8">'+label+'</text>';
    });

    h+='</svg></div>';
  } else if(logs.length===1){
    h+='<div style="padding:20px;border-radius:12px;background:'+c.surface+';border:1px solid '+c.border+';text-align:center;color:'+c.text3+'">Log at least 2 days to see the trend chart.</div>';
  } else {
    h+='<div style="padding:20px;border-radius:12px;background:'+c.surface+';border:1px solid '+c.border+';text-align:center;color:'+c.text3+'">No weight data yet. Log your first entry above!</div>';
  }

  // Recent entries table
  if(logs.length>0){
    h+='<div style="padding:16px;border-radius:12px;background:'+c.surface+';border:1px solid '+c.border+'">';
    h+='<div style="font-size:14px;font-weight:600;color:'+c.text+';margin-bottom:12px">Recent Entries</div>';
    const recent=logs.slice(-10).reverse();
    recent.forEach((l,i)=>{
      const d=new Date(l.date+'T12:00:00');
      const dayLabel=l.date===today?'Today':d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
      const prev=logs[logs.indexOf(l)-1];
      let diff='';
      if(prev){const delta=+(l.weight-prev.weight).toFixed(1);diff=delta>0?'<span style="color:'+c.red+'">↑'+delta+'</span>':delta<0?'<span style="color:'+c.green+'">↓'+Math.abs(delta)+'</span>':'<span style="color:'+c.text3+'">—</span>';}
      h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;'+(i<recent.length-1?'border-bottom:1px solid '+c.border:'')+'">';
      h+='<span style="font-size:13px;color:'+c.text2+'">'+dayLabel+'</span>';
      h+='<span style="font-family:'+FM+';font-size:14px;font-weight:600;color:'+c.text+'">'+l.weight+' kg</span>';
      h+='<span style="font-family:'+FM+';font-size:11px">'+diff+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }

  return h;
}

function logWeightFromInput(){
  const el=document.getElementById('weight-input');
  const dateEl=document.getElementById('weight-date');
  if(!el||!el.value)return;
  logWeight(el.value,dateEl?dateEl.value:new Date().toLocaleDateString('en-CA'));
}

function renderCalendar(){
  const c=C(),now=new Date();
  const fd=new Date(S.vy,S.vm,1).getDay();
  const dim=new Date(S.vy,S.vm+1,0).getDate();
  const isCurrentMonth=now.getFullYear()===S.vy&&now.getMonth()===S.vm;
  const today=isCurrentMonth?now.getDate():-1;

  if(S.selDay===null&&isCurrentMonth) S.selDay=today;

  const byDay={};
  S.events.forEach(e=>{const md=new Date(e.start);
    if(md.getFullYear()===S.vy&&md.getMonth()===S.vm)(byDay[md.getDate()]=byDay[md.getDate()]||[]).push(e)});

  const totalMeetings=S.events.filter(e=>{const md=new Date(e.start);return md.getFullYear()===S.vy&&md.getMonth()===S.vm}).length;

  let h='';

  // ══════════════════════════════════════
  // TODAY'S / SELECTED DAY'S AGENDA (TOP)
  // ══════════════════════════════════════
  const viewDay=S.selDay||today;
  if(viewDay>0){
    const dm=(byDay[viewDay]||[]).sort((a,b)=>a.start.localeCompare(b.start));
    const selDate=new Date(S.vy,S.vm,viewDay);
    const dayName=selDate.toLocaleDateString('en-IN',{weekday:'long'});
    const isViewToday=viewDay===today;

    h+=`<div style="padding:22px;border-radius:14px;background:${c.surface};border:1px solid ${c.border};margin-bottom:24px">`;

    // Agenda header
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${dm.length?'16':'0'}px">`;
    h+=`<div style="display:flex;align-items:center;gap:10px">`;
    if(isViewToday) h+=`<div style="width:8px;height:8px;border-radius:50%;background:${c.accent}"></div>`;
    h+=`<div>
      <div style="font-size:20px;font-weight:700;color:${c.text}">${dayName}${isViewToday?'':''}</div>
      <div style="font-family:${FM};font-size:12px;color:${c.text2};margin-top:2px">${selDate.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
    </div>`;
    h+=`</div>`;
    h+=`<div style="text-align:right">`;
    if(isViewToday) h+=`<div style="font-family:${FM};font-size:10px;color:${c.accent};font-weight:600;padding:3px 10px;border-radius:5px;background:${c.accentBg};margin-bottom:4px">TODAY</div>`;
    h+=`<div style="font-family:${FM};font-size:12px;color:${c.text3}">${dm.length} meeting${dm.length!==1?'s':''}</div>`;
    h+=`</div></div>`;

    if(!dm.length){
      h+=`<div style="text-align:center;padding:20px 0">
        <div style="font-size:14px;color:${c.text3}">No meetings scheduled</div>
      </div>`;
    }

    dm.forEach(m=>{
      const startTime=new Date(m.start);
      const t=startTime.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
      const pl=m.platform==='teams'?'MS Teams':m.platform==='meet'?'Google Meet':m.platform==='zoom'?'Zoom':m.platform;
      const isTms=m.platform==='teams';
      const dotColor=isTms?c.outlook:c.gmail;

      // Check if meeting is happening now
      const endTime=m.end?new Date(m.end):new Date(startTime.getTime()+3600000);
      const isNow=isViewToday&&now>=startTime&&now<=endTime;
      const isNext=isViewToday&&!isNow&&startTime>now;

      h+=`<div style="display:flex;gap:14px;padding:16px;border-radius:10px;margin-bottom:6px;background:${isNow?c.accentBg:c.surface2};border:1px solid ${isNow?c.accentBorder:c.border};transition:background 0.15s;position:relative"`;
      h+=` onmouseenter="this.style.background='${S.dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.04)'}'" onmouseleave="this.style.background='${isNow?c.accentBg:c.surface2}'"`;
      h+=`>`;

      // Live/next badge
      if(isNow) h+=`<div style="position:absolute;top:8px;right:12px;font-family:${FM};font-size:8px;color:${c.green};font-weight:600;padding:2px 8px;border-radius:4px;background:rgba(46,125,66,0.1);letter-spacing:1px">● LIVE</div>`;

      // Time column
      h+=`<div style="min-width:60px;text-align:right;padding-top:2px">
        <div style="font-family:${FM};font-size:14px;font-weight:600;color:${c.text}">${t.split(' ')[0]}</div>
        <div style="font-family:${FM};font-size:10px;color:${c.text3}">${t.split(' ')[1]||''}</div>
      </div>`;

      // Color bar
      h+=`<div style="width:3px;border-radius:2px;background:${dotColor};flex-shrink:0"></div>`;

      // Content
      h+=`<div style="flex:1;min-width:0">
        <div style="font-size:16px;font-weight:600;color:${c.text};margin-bottom:4px">${esc(m.title)}</div>
        <div style="font-family:${FM};font-size:11px;color:${c.text2}">${pl}</div>
      </div>`;

      // Join button
      if(m.link) h+=`<a href="${esc(m.link)}" target="_blank" style="align-self:center;padding:10px 20px;border-radius:8px;font-family:${FM};font-size:12px;font-weight:600;color:#fff;background:${dotColor};text-decoration:none;white-space:nowrap;transition:opacity 0.15s" onmouseenter="this.style.opacity='0.85'" onmouseleave="this.style.opacity='1'">Join ↗</a>`;

      h+=`</div>`;
    });
    h+='</div>';
  }

  // ══════════════════════════════════════
  // CALENDAR GRID (BOTTOM)
  // ══════════════════════════════════════

  // Navigation header
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;align-items:baseline;gap:10px">
      <span style="font-size:22px;font-weight:700;color:${c.text}">${MONTHS[S.vm]}</span>
      <span style="font-size:22px;font-weight:300;color:${c.text2}">${S.vy}</span>
      <span style="font-family:${FM};font-size:11px;color:${c.text3};margin-left:4px">${totalMeetings} meeting${totalMeetings!==1?'s':''}</span>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <span style="font-family:${FM};font-size:11px;padding:5px 12px;border-radius:6px;background:${c.outlookBg};color:${c.outlook};font-weight:500">Outlook</span>
      <span style="font-family:${FM};font-size:11px;padding:5px 12px;border-radius:6px;background:${c.gmailBg};color:${c.gmail};font-weight:500">Gmail</span>
      <div style="width:8px"></div>
      <button onclick="calPrev()" style="padding:7px 12px;border-radius:7px;border:1px solid ${c.border};background:${c.surface};color:${c.text};cursor:pointer;font-size:16px;transition:background 0.15s" onmouseenter="this.style.background='${c.surface2}'" onmouseleave="this.style.background='${c.surface}'">&lsaquo;</button>
      <button onclick="calToday()" style="padding:7px 14px;border-radius:7px;border:1px solid ${isCurrentMonth?c.accentBorder:c.border};background:${isCurrentMonth?c.accentBg:c.surface};color:${isCurrentMonth?c.accent:c.text};cursor:pointer;font-family:${FM};font-size:11px;font-weight:600;transition:background 0.15s">Today</button>
      <button onclick="calNext()" style="padding:7px 12px;border-radius:7px;border:1px solid ${c.border};background:${c.surface};color:${c.text};cursor:pointer;font-size:16px;transition:background 0.15s" onmouseenter="this.style.background='${c.surface2}'" onmouseleave="this.style.background='${c.surface}'">&rsaquo;</button>
    </div>
  </div>`;

  // Day headers
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">';
  DAYS.forEach(d=>{h+=`<div style="text-align:center;font-family:${FM};font-size:11px;color:${c.text3};padding:6px 4px;font-weight:500">${d}</div>`});
  h+='</div>';

  // Grid
  h+='<div class="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
  for(let i=0;i<fd;i++) h+=`<div style="min-height:70px"></div>`;

  for(let day=1;day<=dim;day++){
    const dm=byDay[day]||[];
    const isT=day===today;
    const isS=day===S.selDay;
    const hasMeetings=dm.length>0;

    let bg=c.surface, bdr=c.border, dayColor=c.text;
    if(isS){ bg=c.accentBg; bdr=c.accentBorder; dayColor=c.accent; }
    else if(isT){ bg=S.dark?'rgba(139,105,20,0.06)':'rgba(139,105,20,0.04)'; bdr='rgba(139,105,20,0.15)'; dayColor=c.accent; }

    h+=`<div onclick="selectDay(${day})" style="padding:8px 6px;border-radius:10px;min-height:70px;cursor:pointer;background:${bg};border:1px solid ${bdr};transition:all 0.12s"`;
    h+=` onmouseenter="this.style.borderColor='${c.accentBorder}'" onmouseleave="this.style.borderColor='${isS?c.accentBorder:isT?'rgba(139,105,20,0.15)':c.border}'"`;
    h+=`>`;

    h+=`<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">`;
    if(isT) h+=`<div style="width:5px;height:5px;border-radius:50%;background:${c.accent}"></div>`;
    h+=`<span style="font-family:${FM};font-size:13px;font-weight:${isT||isS?'700':'500'};color:${dayColor}">${day}</span>`;
    if(hasMeetings) h+=`<span style="font-family:${FM};font-size:9px;color:${c.text3};margin-left:auto">${dm.length}</span>`;
    h+=`</div>`;

    dm.slice(0,2).forEach(m=>{
      const t=new Date(m.start).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false});
      const isTms=m.platform==='teams';
      h+=`<div class="meet-chip" style="font-family:${FM};font-size:9px;padding:2px 5px;border-radius:4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;background:${isTms?c.outlookBg:c.gmailBg};color:${isTms?c.outlook:c.gmail}">${t} ${esc(m.title)}</div>`;
    });
    if(dm.length>2) h+=`<div style="font-family:${FM};font-size:8px;color:${c.text3};margin-top:2px;text-align:center">+${dm.length-2} more</div>`;
    h+='</div>';
  }
  h+='</div>';

  return h;
}

function renderKanban(){
  const c=C();
  const cols=[{key:'todo',label:'To Do',color:c.accent,icon:'○',next:'inprogress'},
    {key:'inprogress',label:'In Progress',color:c.amber,icon:'◐',next:'completed',prev:'todo'},
    {key:'completed',label:'Done',color:c.green,icon:'●',prev:'inprogress'}];

  let h=`<div style="display:flex;gap:8px;margin-bottom:20px;padding:4px;border-radius:10px;background:${c.surface};border:1px solid ${c.border};flex-wrap:wrap">
    <input id="task-input" placeholder="Type a task… or send voice via Telegram" style="flex:1;min-width:200px;padding:12px 16px;border-radius:7px;background:transparent;border:none;outline:none;font-size:14px;color:${c.text}" onkeydown="if(event.key==='Enter')addNewTask()">
    <div style="display:flex;gap:4px;align-items:center">
      <input type="date" id="task-date" value="${new Date().toLocaleDateString('en-CA')}" style="padding:8px 10px;border-radius:7px;border:1px solid ${c.border};background:${c.surface2};color:${c.text};font-family:${FM};font-size:11px;outline:none;width:130px">
      <button onclick="addNewTask()" style="padding:10px 20px;border-radius:7px;border:none;cursor:pointer;background:${c.accent};color:#fff;font-family:${FM};font-size:13px;font-weight:600">+ Add</button>
    </div>
  </div><div class="kanban-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">`;

  cols.forEach(col=>{
    const items=S.tasks.filter(t=>t.status===col.key);
    h+=`<div ondragover="event.preventDefault()" ondrop="dropTask('${col.key}')" style="background:${c.surface};border-radius:12px;border:1px solid ${c.border};padding:14px;min-height:280px">`;
    h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid ${c.border}">
      <span style="font-size:12px;color:${col.color}">${col.icon}</span>
      <span style="font-family:${FM};font-size:10px;font-weight:600;color:${col.color};letter-spacing:1.5px;text-transform:uppercase">${col.label}</span>
      <span style="margin-left:auto;font-family:${FM};font-size:10px;color:${c.text3};background:${c.surface2};padding:2px 8px;border-radius:6px">${items.length}</span>
    </div>`;
    items.forEach(t=>{
      h+=`<div draggable="true" ondragstart="S.dragId=${t.id}" ondragend="S.dragId=null" style="padding:12px 14px;border-radius:8px;margin-bottom:6px;background:${c.surface2};border:1px solid ${c.border};cursor:grab">
        <div style="font-size:13px;line-height:1.5;margin-bottom:8px;color:${col.key==='completed'?c.text3:c.text};${col.key==='completed'?'text-decoration:line-through':''}">${esc(t.text)}${t.is_default?`<span style="font-family:${FM};font-size:8px;color:${c.text3};margin-left:6px;vertical-align:super">DAILY</span>`:''}</div>
        <div style="display:flex;gap:4px">
          ${col.prev?`<button onclick="updateTask(${t.id},{status:'${col.prev}'})" style="font-family:${FM};font-size:9px;padding:3px 10px;border-radius:5px;border:1px solid ${c.border};background:${c.surface};color:${c.text2};cursor:pointer">← Back</button>`:''}
          ${col.next?`<button onclick="updateTask(${t.id},{status:'${col.next}'})" style="font-family:${FM};font-size:9px;padding:3px 10px;border-radius:5px;border:none;background:${c.accentBg};color:${col.color};cursor:pointer">${col.key==='todo'?'Start →':'Done →'}</button>`:''}
          ${col.key!=='completed'?`<button onclick="event.stopPropagation();pomoFromTask(${t.id})" style="font-family:${FM};font-size:9px;padding:3px 8px;border-radius:5px;border:none;background:rgba(192,57,43,0.06);color:${c.red};cursor:pointer" title="Start Pomodoro">🍅</button>`:''}
          <button onclick="event.stopPropagation();rescheduleTask(${t.id})" style="font-family:${FM};font-size:9px;padding:3px 8px;border-radius:5px;border:none;background:${c.accentBg};color:${c.accent};cursor:pointer" title="Move to another date">📅</button>
          <button onclick="deleteTask(${t.id})" style="font-family:${FM};font-size:9px;padding:3px 8px;border-radius:5px;border:none;background:rgba(192,57,43,0.06);color:${c.red};cursor:pointer;margin-left:auto;opacity:0.5">×</button>
        </div></div>`;
    });
    h+='</div>';
  });
  h+='</div>';
  return h;
}

  return h;

function toggleTheme(){S.dark=!S.dark;document.body.className=S.dark?'dark':'';renderHeader();renderCountdownFull();renderTabs();renderContent()}
function switchTab(t){S.tab=t;renderTabs();if(t==='meetings')fetchEvents();else if(t==='tasks'){fetchTasks();fetchPomoToday();if(S.taskView==='month')fetchMonthTasks()}else if(t==='habits'){fetchHabitsToday();fetchPomoToday();fetchVitamins();if(S.habitView==='month')fetchHabitMonth()}else if(t==='vitamins'){fetchVitamins()}else if(t==='hobbies'){fetchHobbyProgress();if(!S.chessPuzzle)fetchChessPuzzle()}else if(t==='kaaya'){fetchWeight()}else if(t==='sadhana'){fetchSadhana()}else{fetchSettings();fetchDefaults();fetchHabitsToday();fetchVitamins();fetchAllVitamins()};renderContent()}
function setTaskView(v){S.taskView=v;if(v==='month')fetchMonthTasks();else fetchTasks();renderContent()}
function viewTaskDate(dateStr){S.taskDate=dateStr;S.taskView='today';fetchTasks();renderContent()}
function taskDatePrev(){const d=new Date(S.taskDate+'T12:00:00');d.setDate(d.getDate()-1);S.taskDate=d.toLocaleDateString('en-CA');fetchTasks()}
function taskDateNext(){const d=new Date(S.taskDate+'T12:00:00');d.setDate(d.getDate()+1);S.taskDate=d.toLocaleDateString('en-CA');fetchTasks()}
function taskDateToday(){S.taskDate=new Date().toLocaleDateString('en-CA');fetchTasks()}
function setHabitView(v){S.habitView=v;if(v==='month')fetchHabitMonth();else fetchHabitsToday();renderContent()}
function habitMonthPrev(){if(S.hvm===0){S.hvm=11;S.hvy--}else S.hvm--;fetchHabitMonth()}
function habitMonthNext(){if(S.hvm===11){S.hvm=0;S.hvy++}else S.hvm++;fetchHabitMonth()}
function habitMonthToday(){const n=new Date();S.hvm=n.getMonth();S.hvy=n.getFullYear();fetchHabitMonth()}
function addNewHabit(){const el=document.getElementById('habit-input');if(el&&el.value.trim()){addHabit(el.value.trim());el.value=''}}
function openDayModal(dateStr){S._modalDate=dateStr;renderDayModal(dateStr)}
function renderDayModal(dateStr){
  const c=C();
  const hm=S.habitMonth;
  const habits=(hm.habits||[]);
  const byDate=hm.byDate||{};
  const dayData=byDate[dateStr]||{};
  const d=new Date(dateStr+'T12:00:00');
  const label=d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let existing=document.getElementById('day-modal-overlay');
  if(!existing){
    existing=document.createElement('div');
    existing.id='day-modal-overlay';
    existing.onclick=function(e){if(e.target===existing)closeDayModal()};
    document.body.appendChild(existing);
  }
  existing.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:flex-end;justify-content:center';
  let rows='';
  habits.forEach(hab=>{
    const done=dayData[hab.id]||0;
    rows+=`<div onclick="toggleHabitDate(${hab.id},'${dateStr}')" style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;margin-bottom:6px;background:${done?'rgba(46,125,66,0.06)':c.surface2};border:1px solid ${done?'rgba(46,125,66,0.15)':c.border};cursor:pointer">
      <div style="width:22px;height:22px;border-radius:6px;border:2px solid ${done?c.green:c.text3};background:${done?c.green:'transparent'};display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0">${done?'✓':''}</div>
      <div style="font-size:15px;font-weight:500;color:${done?c.text3:c.text};${done?'text-decoration:line-through':''}">${esc(hab.name)}</div>
    </div>`;
  });
  existing.innerHTML=`<div style="width:100%;max-width:520px;background:${S.dark?'#1a1a1e':'#faf9f7'};border-radius:18px 18px 0 0;padding:24px 20px 32px;max-height:80vh;overflow-y:auto;box-shadow:0 -8px 32px rgba(0,0,0,0.2)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div style="font-size:16px;font-weight:600;color:${c.text}">${label}</div>
      <button onclick="closeDayModal()" style="width:28px;height:28px;border-radius:50%;border:none;background:${c.surface2};color:${c.text2};cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">×</button>
    </div>
    ${habits.length===0?`<div style="color:${c.text3};text-align:center;padding:20px">No habits configured.</div>`:rows}
  </div>`;
}

function renderSadhana(){
  const c=C();
  const todayStr=new Date().toLocaleDateString('en-CA');
  const isToday=S.sadhanaDate===todayStr;
  const viewDate=new Date(S.sadhanaDate+'T12:00:00');
  const dateLabel=isToday?'Today':viewDate.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

  let h='';

  // Date navigation
  h+='<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px">';
  h+='<button onclick="sadhanaDatePrev()" style="padding:6px 12px;border-radius:6px;border:1px solid '+c.border+';background:'+c.surface+';color:'+c.text2+';cursor:pointer;font-size:14px">&lsaquo;</button>';
  h+='<span style="font-family:'+FM+';font-size:13px;font-weight:600;color:'+(isToday?c.accent:c.text)+';min-width:140px;text-align:center">'+dateLabel+'</span>';
  h+='<button onclick="sadhanaDateNext()" style="padding:6px 12px;border-radius:6px;border:1px solid '+c.border+';background:'+c.surface+';color:'+c.text2+';cursor:pointer;font-size:14px">&rsaquo;</button>';
  if(!isToday) h+='<button onclick="sadhanaDateToday()" style="padding:6px 14px;border-radius:6px;border:1px solid '+c.accentBorder+';background:'+c.accentBg+';color:'+c.accent+';cursor:pointer;font-family:'+FM+';font-size:11px;font-weight:500">Today</button>';
  h+='</div>';

  if(S.sadhanaItems.length===0){
    h+='<div style="text-align:center;padding:40px;color:'+c.text3+'">Loading...</div>';
    return h;
  }

  S.sadhanaItems.forEach(item=>{
    const phase=item.phase;
    const target=phase.target;
    const count=item.today_count;
    const overTarget=count>target&&target>0;
    const atTarget=count<=target;
    const isFreedom=target===0&&item.current_phase===item.total_phases-1;
    const phaseUnit=phase.unit||item.unit;

    h+='<div style="padding:22px;border-radius:14px;background:'+c.surface+';border:1px solid '+c.border+';margin-bottom:20px">';

    // Header
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    h+='<div style="font-size:20px;font-weight:700;color:'+c.text+'">'+esc(item.name)+'</div>';
    if(item.streak>0) h+='<div style="font-family:'+FM+';font-size:12px;color:'+c.green+';font-weight:600">🔥 '+item.streak+' day streak</div>';
    h+='</div>';

    // Phase info
    h+='<div style="font-family:'+FM+';font-size:12px;color:'+c.accent+';margin-bottom:4px">'+phase.label+'</div>';
    h+='<div style="font-size:13px;color:'+c.text2+';margin-bottom:16px;line-height:1.5">'+phase.desc+'</div>';

    // Phase progress dots
    h+='<div style="display:flex;gap:6px;margin-bottom:20px;align-items:center">';
    item.phases.forEach((p,i)=>{
      const done=i<item.current_phase;
      const current=i===item.current_phase;
      const clr=done?c.green:current?c.accent:c.text3;
      h+='<div style="width:'+(current?'28':'10')+'px;height:10px;border-radius:5px;background:'+clr+';opacity:'+(done||current?'1':'0.3')+';transition:all 0.3s"></div>';
    });
    h+='<span style="font-family:'+FM+';font-size:10px;color:'+c.text3+';margin-left:6px">Phase '+(item.current_phase+1)+'/'+item.total_phases+'</span>';
    h+='</div>';

    if(!isFreedom){
      // Today's counter
      h+='<div style="display:flex;align-items:center;gap:20px;margin-bottom:20px">';
      h+='<div style="text-align:center">';
      h+='<div style="font-family:'+FM+';font-size:10px;color:'+c.text3+';letter-spacing:1px;margin-bottom:6px">'+(isToday?'TODAY':dateLabel.toUpperCase())+'</div>';
      h+='<div style="display:flex;align-items:center;gap:12px">';
      h+='<button onclick="logSadhana('+item.id+',Math.max(0,'+count+'-1))" style="width:36px;height:36px;border-radius:50%;border:1px solid '+c.border+';background:'+c.surface2+';cursor:pointer;font-size:18px;color:'+c.text2+'">−</button>';
      h+='<div style="font-size:36px;font-weight:300;color:'+(overTarget?c.red:c.green)+';min-width:50px;text-align:center;font-family:'+FM+'">'+count+'</div>';
      h+='<button onclick="logSadhana('+item.id+','+(count+1)+')" style="width:36px;height:36px;border-radius:50%;border:1px solid '+c.border+';background:'+c.surface2+';cursor:pointer;font-size:18px;color:'+c.text2+'">+</button>';
      h+='</div></div>';

      // Target indicator
      h+='<div style="flex:1">';
      h+='<div style="font-family:'+FM+';font-size:10px;color:'+c.text3+';letter-spacing:1px;margin-bottom:6px">TARGET</div>';
      h+='<div style="font-size:14px;color:'+c.text2+'">Max <span style="font-weight:700;color:'+(overTarget?c.red:c.green)+'">'+target+'</span> '+phaseUnit+'</div>';
      if(overTarget) h+='<div style="font-family:'+FM+';font-size:11px;color:'+c.red+';margin-top:4px">⚠ Over target by '+(count-target)+'</div>';
      else if(count===0&&target>0) h+='<div style="font-family:'+FM+';font-size:11px;color:'+c.green+';margin-top:4px">✨ Clean so far today!</div>';
      else if(atTarget) h+='<div style="font-family:'+FM+';font-size:11px;color:'+c.green+';margin-top:4px">✓ Within target</div>';
      h+='</div></div>';

      // 7-day mini chart
      const last7=item.history.slice(-7);
      if(last7.length>0){
        const maxVal=Math.max(...last7.map(d=>d.count),target,1);
        h+='<div style="margin-bottom:16px">';
        h+='<div style="font-family:'+FM+';font-size:10px;color:'+c.text3+';letter-spacing:1px;margin-bottom:8px">LAST 7 DAYS</div>';
        h+='<div style="display:flex;align-items:flex-end;gap:4px;height:60px">';
        last7.forEach(d=>{
          const pct=Math.max(5,d.count/maxVal*100);
          const over=d.count>target;
          const day=new Date(d.date+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short'}).charAt(0);
          h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center">';
          h+='<div style="width:100%;height:'+pct+'%;min-height:4px;border-radius:3px 3px 0 0;background:'+(over?c.red:c.green)+';opacity:0.7"></div>';
          h+='<div style="font-family:'+FM+';font-size:9px;color:'+c.text3+';margin-top:4px">'+day+'</div>';
          h+='</div>';
        });
        // Target line reference
        h+='</div>';
        h+='<div style="font-family:'+FM+';font-size:9px;color:'+c.text3+';margin-top:4px">Green = within target · Red = over target</div>';
        h+='</div>';
      }
    } else {
      // Freedom state
      h+='<div style="text-align:center;padding:30px 0">';
      h+='<div style="font-size:48px;margin-bottom:12px">🕊️</div>';
      h+='<div style="font-size:18px;font-weight:600;color:'+c.green+'">You are free.</div>';
      h+='<div style="font-size:13px;color:'+c.text2+';margin-top:8px">Mahakaal is proud of your discipline.</div>';
      h+='</div>';
    }

    // Phase navigation
    if(!isFreedom){
      h+='<div style="display:flex;gap:8px;margin-top:4px">';
      if(item.current_phase>0) h+='<button onclick="advancePhase('+item.id+','+(item.current_phase-1)+')" style="padding:6px 14px;border-radius:6px;border:1px solid '+c.border+';background:'+c.surface+';color:'+c.text2+';cursor:pointer;font-family:'+FM+';font-size:11px">← Previous Phase</button>';
      if(item.current_phase<item.total_phases-1) h+='<button onclick="if(confirm(\'Ready to move to the next phase? This means a stricter target.\')){advancePhase('+item.id+','+(item.current_phase+1)+')}" style="padding:6px 14px;border-radius:6px;border:none;background:'+c.accent+';color:#fff;cursor:pointer;font-family:'+FM+';font-size:11px;font-weight:600">Next Phase →</button>';
      h+='</div>';
    }

    h+='</div>';
  });

  // Motivational footer
  h+='<div style="text-align:center;padding:16px;font-size:13px;color:'+c.text3+';font-style:italic">';
  h+='"Every day you resist is a day you grow stronger." — Mahakaal 🔱';
  h+='</div>';

  return h;
}
function chessClick(sq,r,cl){
  if(S.chessSolved)return;
  if(!S.chessSelected){S.chessSelected=sq;renderContent();return}
  const move=S.chessSelected+sq;
  const solution=S.chessPuzzle.solution||[];
  const moveIdx=S.chessMoves.length;
  if(move===solution[moveIdx]){
    S.chessMoves.push(move);S.chessSelected=null;
    if(S.chessMoves.length>=solution.length){S.chessSolved=true;saveHobbyProgress('chess',0,{puzzleId:S.chessPuzzle.id})}
    renderContent();
  } else {S.chessSelected=null;renderContent();alert('Wrong move! Try again.')}
}
function chessShowHint(){const s=S.chessPuzzle.solution||[];const m=s[S.chessMoves.length]||'';if(m)alert('Hint: move from '+m.slice(0,2)+' to '+m.slice(2,4))}
function chessShowSolution(){const s=S.chessPuzzle.solution||[];alert('Solution: '+s.join(' → '))}

function addNewVitamin(){
  const name=document.getElementById('vit-name');
  const type=document.getElementById('vit-type');
  const notes=document.getElementById('vit-notes');
  if(!name||!name.value.trim())return;
  const schedType=type?type.value:'daily';
  let schedValue=1;
  if(schedType==='weekly'){const d=document.getElementById('vit-day');schedValue=d?parseInt(d.value):1;}
  if(schedType==='interval'){const iv=document.getElementById('vit-interval');schedValue=iv?parseInt(iv.value)||2:2;}
  const slots=[];
  if(document.getElementById('vit-morning')&&document.getElementById('vit-morning').checked)slots.push('morning');
  if(document.getElementById('vit-noon')&&document.getElementById('vit-noon').checked)slots.push('noon');
  if(document.getElementById('vit-night')&&document.getElementById('vit-night').checked)slots.push('night');
  if(!slots.length)slots.push('morning');
  addVitamin(name.value.trim(),schedType,schedValue,slots.join(','),notes?notes.value:'');
  name.value='';if(notes)notes.value='';
}

function updateBirth(v){S.birth=v;saveSetting('birth_date',v);renderCountdownFull()}
function updateDeath(v){S.death=v;saveSetting('death_date',v);renderCountdownFull()}

function tickPomo(){
  if(!S.pomo.active) return;
  S.pomo.timeLeft--;
  if(S.pomo.timeLeft<=0){
    if(S.pomo.onBreak){
      // Break finished
      S.pomo.active=false;S.pomo.onBreak=false;
      renderContent();
    } else {
      // Work session finished
      completePomo();
    }
    return;
  }
  // Update timer display without full re-render
  const mins=Math.floor(S.pomo.timeLeft/60);
  const secs=S.pomo.timeLeft%60;
  const el=document.getElementById('pomo-time');
  if(el) el.textContent=pad(mins)+':'+pad(secs);
  const bar=document.getElementById('pomo-bar');
  if(bar){
    const totalSecs=S.pomo.onBreak?(S.pomo.count%4===0?15:5)*60:S.pomo.duration*60;
    bar.style.width=(S.pomo.timeLeft/totalSecs*100)+'%';
  }
}
